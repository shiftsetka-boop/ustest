<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Boxing Championship - Universal</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --red: #ff3b30; 
            --green: #2ecc71;
        }
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            touch-action: none; 
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Segoe UI', sans-serif; 
        }

        #game-view {
            position: relative; 
            height: 100vh; 
            width: 100vw; 
            max-width: 500px; /* Обмеження для ПК, щоб гра не розповзалася */
            background: url('cinematic_boxing_ring.png') center center / cover no-repeat;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* HUD */
        .top-nav { position: absolute; top: 0; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent); padding: 25px 15px; z-index: 100; }
        .header-main { display: flex; justify-content: space-between; align-items: flex-start; }
        .fighter-info { width: 36%; }
        .hp-bar-bg { width: 100%; height: 16px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--green), #a2ff00); transition: width 0.4s; }
        .timer-box { display: flex; flex-direction: column; align-items: center; border: 2px solid var(--gold); padding: 5px 10px; border-radius: 10px; background: #000; min-width: 70px; }
        .time-val { color: var(--gold); font-weight: 900; font-size: 18px; }

        /* АРЕНА - Ключове виправлення */
        .arena { 
            position: absolute; 
            bottom: 10%; /* Прив'язка до низу у відсотках */
            left: 0;
            width: 100%; 
            aspect-ratio: 1 / 1; /* Робимо зону бою квадратною для всіх екранів */
            z-index: 10; 
        }

        .fighter-wrapper {
            position: absolute;
            height: 90%; 
            width: 50%; 
            bottom: 0;
            transition: transform 0.15s;
        }
        
        #usyk-wrap { left: 0; }
        #rico-wrap { right: 0; }

        .fighter { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Персонаж завжди вписаний в контейнер */
            position: absolute;
            bottom: 0;
        }
        #rico-img { transform: scaleX(-1); }

        /* ТОЧКИ - ТЕПЕР ВІДСОТКОВІ */
        .hit-btn { 
            position: absolute; 
            width: 25%; /* Розмір кнопки адаптується до ширини бійця */
            aspect-ratio: 1/1;
            z-index: 110; 
            display: flex; align-items: center; justify-content: center;
            left: 50%; 
            transform: translateX(-50%);
        }
        
        .dot {
            width: 40%; height: 40%; border: 3px solid #fff; border-radius: 50%;
            background: radial-gradient(circle, #ff0000, #800);
            box-shadow: 0 0 15px var(--red);
            animation: pulse 0.6s infinite alternate;
        }
        
        /* Координати: підбирай ці % під свої спрайти */
        .u-head { top: 15%; }  
        .u-body { top: 30%; } 
        .r-head { top: 15%; }  
        .r-body { top: 30%; }

        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }

        /* ЕФЕКТИ */
        .ko-floor { transform: translateY(30%) !important; opacity: 0.5; transition: 1s; }
        .ko-floor-r { transform: scaleX(-1) translateY(30%) !important; opacity: 0.5; transition: 1s; }
        .flash { animation: f 0.1s linear; }
        @keyframes f { 50% { filter: brightness(3); } }

        /* ІНТЕРФЕЙС */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .instruction { border: 2px solid var(--gold); padding: 8px 18px; border-radius: 20px; color: #fff; font-weight: 900; background: rgba(0,0,0,0.6); font-size: 13px; letter-spacing: 1px; }

        #ui-win { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: #fff; padding: 20px; }
        .win-card { border: 3px solid var(--gold); padding: 40px 20px; text-align: center; border-radius: 25px; width: 100%; max-width: 320px; background: #111; }
        .btn-bonus { background: var(--gold); color: #000; padding: 15px 25px; text-decoration:none; font-weight:900; border-radius:12px; display:inline-block; text-transform:uppercase; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-view">
    <div class="top-nav">
        <div class="header-main">
            <div class="fighter-info">
                <div style="color:#fff; font-weight:900; margin-bottom:5px; font-size:11px; text-transform: uppercase;">Усик</div>
                <div class="hp-bar-bg"><div id="hp-fill-usyk" class="hp-fill"></div></div>
            </div>
            <div class="timer-box">
                <div id="timer" class="time-val">03:00</div>
            </div>
            <div class="fighter-info">
                <div style="color:var(--gold); font-weight:900; text-align:right; margin-bottom:5px; font-size:11px; text-transform: uppercase;">Ріко</div>
                <div class="hp-bar-bg"><div id="hp-fill-rico" class="hp-fill" style="float:right"></div></div>
            </div>
        </div>
    </div>

    <div class="arena">
        <!-- БОЄЦЬ 1 -->
        <div class="fighter-wrapper" id="usyk-wrap">
            <img src="usyk_stance.png" id="usyk-img" class="fighter">
            <!-- Точки на Усику (по них клікає опонент/гравець) -->
            <div class="hit-btn u-head" onclick="kick('rico', 'usyk', 'head')"><div class="dot"></div></div>
            <div class="hit-btn u-body" onclick="kick('rico', 'usyk', 'body')"><div class="dot"></div></div>
        </div>

        <!-- БОЄЦЬ 2 -->
        <div class="fighter-wrapper" id="rico-wrap">
            <img src="verhoeven_stance.png" id="rico-img" class="fighter">
            <!-- Точки на Ріко -->
            <div class="hit-btn r-head" onclick="kick('usyk', 'rico', 'head')"><div class="dot"></div></div>
            <div class="hit-btn r-body" onclick="kick('usyk', 'rico', 'body')"><div class="dot"></div></div>
        </div>
    </div>

    <div class="bottom-nav"><div class="instruction">ТИЦЯЙ ПО ТОЧКАХ!</div></div>

    <!-- ФІНАЛЬНИЙ ЕКРАН -->
    <div id="ui-win">
        <div class="win-card">
            <h1 id="win-text" style="color:var(--gold); margin:0; font-size: 28px;"></h1>
            <p style="margin: 15px 0; font-size: 18px;">👇 ТВІЙ БОНУС ГОТОВИЙ 👇</p>
            <p style="margin: 15px 0; font-size: 18px;">1000₴ + безпроїграшна ставка</p>
            <a href="ТВОЯ_СИЛКА" class="btn-bonus">Забрати бонус</a>
        </div>
    </div>
</div>

<script>
    let hp = { usyk: 100, rico: 100 };
    let lock = false;
    let timerStarted = false;
    let timeLeft = 180;
    let timerInterval;

    function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                checkWinner();
            }
        }, 1000);
    }

    function kick(attacker, target, zone) {
        if (lock || hp[target] <= 0) return;
        lock = true;
        startTimer();

        const aWrap = document.getElementById(attacker + '-wrap');
        const tImg = document.getElementById(target + '-img');
        const gameView = document.getElementById('game-view');

        // Спалах екрану
        gameView.classList.add('flash');
        setTimeout(() => gameView.classList.remove('flash'), 100);

        // Анімація випаду
        let move = (attacker === 'usyk') ? '15%' : '-15%';
        aWrap.style.transform = `translateX(${move})`;

        // Розрахунок шкоди
        hp[target] -= 34;
        document.getElementById(`hp-fill-${target}`).style.width = Math.max(0, hp[target]) + '%';

        if (hp[target] > 0) {
            // Зміна на спрайт отримання удару
            setTimeout(() => {
                tImg.src = (target === 'rico') ? `verhoeven_${zone}_hit.png` : `usyk_${zone}_hit.png`;
            }, 50);

            // Повернення в стійку
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_stance.png' : 'usyk_stance.png';
                aWrap.style.transform = 'none';
                lock = false;
            }, 500); 
        } else {
            // ФІНАЛ (Нокаут)
            clearInterval(timerInterval);
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_knockout.png' : 'usyk_knockout.png';
                tImg.classList.add(target === 'usyk' ? 'ko-floor' : 'ko-floor-r');
                
                // Приховуємо точки
                document.querySelectorAll('.hit-btn').forEach(b => b.style.display = 'none');
                
                setTimeout(() => {
                    document.getElementById('win-text').innerText = (attacker === 'usyk' ? 'УСИК' : 'РІКО') + ' ПЕРЕМІГ!';
                    document.getElementById('ui-win').style.display = 'flex';
                }, 1000);
            }, 50);
        }
    }

    function checkWinner() {
        if(hp.usyk > hp.rico) {
            alert("Час вийшов! Усик переміг за очками!");
        } else {
            alert("Час вийшов! Ріко переміг за очками!");
        }
    }
</script>

</body>
</html>
