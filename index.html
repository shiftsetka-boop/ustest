<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Boxing Championship</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --gold-shine: #fff3a3;
            --red: #ff3b30; 
            --green: #2ecc71;
            --green-glow: #a2ff00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }

        #game-view {
            position: relative; height: 100vh; width: 100vw; max-width: 500px;
            background: url('cinematic_boxing_ring.png') center center / cover no-repeat;
            overflow: hidden;
            box-shadow: inset 0 0 120px #000;
        }

        /* --- HUD --- */
        .top-nav {
            position: absolute; top: 0; width: 100%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
            padding: 25px 15px; z-index: 100;
        }
        .header-main { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .fighter-info { width: 36%; }
        .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .flag { width: 24px; height: 16px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2); }
        .name-text { color: #fff; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        .hp-bar-bg { 
            width: 100%; height: 20px; background: rgba(0,0,0,0.6); 
            border: 2px solid rgba(255,255,255,0.3); border-radius: 5px; overflow: hidden;
        }
        .hp-fill { 
            width: 100%; height: 100%; background: linear-gradient(90deg, var(--green), var(--green-glow)); 
            transition: width 0.4s ease-out; box-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
        }

        .timer-box { 
            display: flex; flex-direction: column; align-items: center; 
            background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 12px;
            border: 2px solid var(--gold); min-width: 80px;
        }
        .time-val { color: var(--gold); font-weight: 900; font-size: 20px; line-height: 1; min-width: 55px; text-align: center; }
        .round-val { color: #fff; font-size: 10px; text-transform: uppercase; margin-top: 4px; opacity: 0.8; }

        /* --- БІЙЦІ --- */
        .arena { position: absolute; bottom: 12%; width: 100%; height: 60%; z-index: 10; }
        .fighter { 
            position: absolute; height: 100%; bottom: 0; object-fit: contain; 
            transition: transform 0.15s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
        }
        #usyk { left: -8%; width: 70%; z-index: 20; }
        #rico { right: -8%; width: 70%; z-index: 20; transform: scaleX(-1); }

        /* --- НОКАУТ (ТВОЇ НАЛАШТУВАННЯ) --- */
        .ko-floor { 
            transform: translateY(40%) translateX(-0%) rotate(-0deg) !important; 
            opacity: 0.6; 
            z-index: 5 !important; 
            pointer-events: none;
            transition: all 0.9s ease-in !important;
        }
        .ko-floor-r { 
            transform: scaleX(-1) translateY(40%) translateX(-0%) rotate(0deg) !important; 
            opacity: 0.6; 
            z-index: 5 !important; 
            pointer-events: none;
            transition: all 0.9s ease-in !important;
        }

        /* --- ТОЧКИ АТАКИ --- */
        .hit-btn { position: absolute; width: 80px; height: 80px; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .dot {
            width: 25px; height: 25px; border: 3px solid #fff; border-radius: 50%;
            background: radial-gradient(circle, #ff0000, #800);
            box-shadow: 0 0 25px var(--red), inset 0 0 10px #000;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.25); } }

        .u-head { top: 18%; left: 12%; } .u-body { top: 30%; left: 10%; }
        .r-head { top: 16%; right: 12%; } .r-body { top: 30%; right: 12%; }

        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 110px; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .instruction {
            background: linear-gradient(145deg, rgba(255,215,0,0.5), rgba(255,215,0,0.1));
            border: 3px solid var(--gold); padding: 16px 0; border-radius: 35px; color: #fff; font-size: 18px; font-weight: 900; 
            text-transform: uppercase; width: 85%; text-align: center; animation: breathe 1.5s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #ui-win { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .win-card { width: 85%; background: linear-gradient(135deg, #1a1a1a, #000); padding: 50px 25px; border: 3px solid var(--gold); border-radius: 30px; text-align: center; }
        .win-title { color: var(--gold); font-size: 42px; margin: 0; font-weight: 900; }
        .cta-btn { display: block; margin-top: 40px; padding: 22px; background: linear-gradient(to bottom, var(--gold-shine), var(--gold)); color: #000; text-decoration: none; border-radius: 15px; font-weight: 900; font-size: 22px; text-transform: uppercase; }
        .flash { animation: f 0.12s linear; }
        @keyframes f { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(3); } }
    </style>
</head>
<body>

<div id="game-view">
    <div class="top-nav">
        <div class="header-main">
            <div class="fighter-info">
                <div class="name-row"><img src="https://flagcdn.com/w80/ua.png" class="flag"><span class="name-text">Усик</span></div>
                <div class="hp-bar-bg"><div id="hp-fill-usyk" class="hp-fill"></div></div>
            </div>
            <div class="timer-box">
                <div id="timer" class="time-val">03:00</div>
                <div class="round-val">Раунд 1</div>
            </div>
            <div class="fighter-info">
                <div class="name-row" style="justify-content: flex-end;"><span class="name-text" style="color:var(--gold)">Ріко</span><img src="https://flagcdn.com/w80/nl.png" class="flag"></div>
                <div class="hp-bar-bg"><div id="hp-fill-rico" class="hp-fill" style="float:right"></div></div>
            </div>
        </div>
    </div>

    <div class="arena">
        <img src="usyk_stance.png" id="usyk" class="fighter">
        <img src="verhoeven_stance.png" id="rico" class="fighter">
        <div class="hit-btn u-head" onclick="kick('rico', 'usyk', 'head')"><div class="dot"></div></div>
        <div class="hit-btn u-body" onclick="kick('rico', 'usyk', 'body')"><div class="dot"></div></div>
        <div class="hit-btn r-head" onclick="kick('usyk', 'rico', 'head')"><div class="dot"></div></div>
        <div class="hit-btn r-body" onclick="kick('usyk', 'rico', 'body')"><div class="dot"></div></div>
    </div>

    <div class="bottom-nav"><div class="instruction">ТИЦЯЙ, ЩОБ АТАКУВАТИ!</div></div>

    <div id="ui-win">
        <div class="win-card">
            <h1 id="win-text" class="win-title">ПЕРЕМОГА!</h1>
            <p style="color:#fff; font-size: 18px; margin-top: 15px; font-weight: bold;">ПОТУЖНО</p>
            <a href="ТВОЯ_СИЛКА_ТУТ" class="cta-btn">ЗАБРАТИ БОНУС</a>
        </div>
    </div>
</div>

<script>
    let hp = { usyk: 100, rico: 100 };
    let lock = false;
    let timerStarted = false;
    let timeLeft = 180; // 3 хвилини в секундах
    let timerInterval;

    function updateTimerDisplay() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) clearInterval(timerInterval);
        }, 1000);
    }

    function kick(attacker, target, zone) {
        if (lock || hp[target] <= 0) return;
        lock = true;
        
        // Запуск таймера при першому ударі
        startTimer();

        const aImg = document.getElementById(attacker);
        const tImg = document.getElementById(target);

        document.getElementById('game-view').classList.add('flash');
        setTimeout(() => document.getElementById('game-view').classList.remove('flash'), 120);

        let move = (attacker === 'usyk') ? '50px' : '-50px';
        aImg.style.transform = (attacker === 'rico') ? `translateX(${move}) scaleX(-1)` : `translateX(${move})`;

        hp[target] -= 34;
        if (hp[target] < 0) hp[target] = 0;
        document.getElementById(`hp-fill-${target}`).style.width = hp[target] + '%';

        if (hp[target] > 0) {
            setTimeout(() => {
                tImg.src = (target === 'rico') ? `verhoeven_${zone}_hit.png` : `usyk_${zone}_hit.png`;
            }, 50);
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_stance.png' : 'usyk_stance.png';
                aImg.style.transform = (attacker === 'rico') ? 'scaleX(-1)' : 'none';
                lock = false;
            }, 600);
        } else {
            // ЗУПИНКА ТАЙМЕРА ПРИ НОКАУТІ
            clearInterval(timerInterval);
            
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_knockout.png' : 'usyk_knockout.png';
                tImg.classList.add(target === 'usyk' ? 'ko-floor' : 'ko-floor-r');
                document.querySelectorAll('.hit-btn, .bottom-nav').forEach(el => el.style.display = 'none');

                setTimeout(() => {
                    aImg.style.transform = (attacker === 'rico') ? 'scaleX(-1)' : 'none';
                    document.getElementById('win-text').innerText = (attacker === 'usyk' ? 'УСИК ПЕРЕМІГ!' : 'РІКО ПЕРЕМІГ!');
                    document.getElementById('ui-win').style.display = 'flex';
                }, 1200);
            }, 50);
        }
    }
</script>
</body>
</html>
