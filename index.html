<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Boxing Championship - UA Extreme</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --gold-shine: #fff3a3;
            --red: #ff3b30; 
            --red-glow: rgba(255, 59, 48, 0.8);
            --green: #2ecc71;
            --green-glow: #a2ff00;
            --glass: rgba(0, 0, 0, 0.7);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        #game-view {
            position: relative; height: 100vh; aspect-ratio: 9 / 16;
            background: url('cinematic_boxing_ring.png') center center / cover no-repeat;
            overflow: hidden;
            box-shadow: inset 0 0 150px #000, inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* --- ПРЕМІУМ HUD (ВЕРХ) --- */
        .top-nav {
            position: absolute; top: 0; width: 100%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.98), transparent);
            padding: 30px 20px; z-index: 100;
        }

        .header-main { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }

        .fighter-info { width: 38%; }
        .name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .flag { width: 28px; height: 19px; border-radius: 4px; box-shadow: 0 0 8px #000; border: 1px solid rgba(255,255,255,0.2); }
        
        .name-text { 
            color: #fff; font-size: 15px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 1.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
            background: linear-gradient(to bottom, #fff, #bbb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #rico-name { background: linear-gradient(to bottom, var(--gold-shine), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .hp-bar-bg { 
            width: 100%; height: 28px; background: rgba(0,0,0,0.6); 
            border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }
        .hp-fill { 
            width: 100%; height: 100%; 
            background: linear-gradient(90deg, var(--green), var(--green-glow)); 
            transition: width 0.4s ease-out; 
            box-shadow: inset 0 0 12px rgba(0,0,0,0.4), 0 0 20px rgba(46, 204, 113, 0.6);
        }

        .timer-box { 
            display: flex; flex-direction: column; align-items: center; 
            background: var(--glass); padding: 10px 20px; border-radius: 15px;
            border: 2px solid rgba(255,215,0,0.4); min-width: 90px;
            box-shadow: 0 0 25px rgba(255,215,0,0.15), inset 0 0 15px rgba(0,0,0,0.5);
        }
        .time-val { 
            color: var(--gold); font-weight: 900; font-size: 26px; line-height: 1; 
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        .round-val { color: #fff; font-size: 11px; text-transform: uppercase; font-weight: bold; margin-top: 5px; opacity: 0.8; }

        /* --- ГІГАНТСЬКА КНОПКА (НИЗ) --- */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; height: 120px; /* Збільшено висоту плашки */
            background: linear-gradient(to top, rgba(0,0,0,0.98), transparent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .instruction {
            background: linear-gradient(145deg, rgba(255,215,0,0.4), rgba(255,215,0,0.1));
            border: 3px solid rgba(255,215,0,0.7); 
            padding: 18px 60px; /* Справді великі відступи всередині */
            border-radius: 40px; 
            color: #fff; 
            font-size: 19px; /* Набагато більший шрифт */
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 2px; 
            text-shadow: 0 3px 6px rgba(0,0,0,0.7);
            box-shadow: 0 0 40px rgba(255,215,0,0.3);
            animation: pulse-glow-extreme 1.5s infinite ease-in-out;
            width: 85%; /* Кнопка займає майже всю ширину */
            text-align: center;
        }
        @keyframes pulse-glow-extreme { 
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255,215,0,0.3); opacity: 0.9; } 
            50% { transform: scale(1.04); box-shadow: 0 0 60px rgba(255,215,0,0.6); opacity: 1; } 
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,215,0,0.3); opacity: 0.9; } 
        }

        /* --- АРЕНА ТА ТОЧКИ --- */
        .arena { position: absolute; bottom: 12%; width: 100%; height: 55%; z-index: 10; }
        .fighter { position: absolute; height: 105%; bottom: -2%; object-fit: contain; object-position: bottom; transition: transform 0.1s ease-out; }
        
        #usyk { left: -12%; width: 75%; z-index: 20; }
        #rico { right: -12%; width: 75%; z-index: 20; transform: scaleX(-1); }

        .hit-btn { position: absolute; width: 90px; height: 90px; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .dot {
            width: 55%; height: 55%; border: 3px solid #fff; border-radius: 50%;
            background: radial-gradient(circle, #ff1a1a 10%, #aa0000 70%, #600 100%);
            box-shadow: 0 0 30px var(--red), 0 0 15px rgba(255,255,255,0.5), inset 0 0 10px rgba(0,0,0,0.6);
            animation: pulse-energy 0.6s infinite alternate;
        }
        @keyframes pulse-energy { 0% { transform: scale(1); box-shadow: 0 0 25px var(--red); } 100% { transform: scale(1.25); box-shadow: 0 0 45px rgba(255, 59, 48, 1), 0 0 20px rgba(255,255,255,0.6); } }

        /* Координати точок */
        .u-head { top: 15%; left: 14%; } .u-body { top: 30%; left: 15%; }
        .r-head { top: 13%; right: 17%; } .r-body { top: 30%; right: 14%; }

        /* Налаштування нокауту */
        .ko-floor { pointer-events: none; z-index: 5 !important; transform: translateY(12%) !important; }
        .ko-floor-r { pointer-events: none; z-index: 5 !important; transform: scaleX(-1) translateY(25%) !important; }

        /* ЕКРАН ПЕРЕМОГИ */
        #ui-win {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .win-card {
            width: 88%; background: linear-gradient(135deg, #1a1a1a, #000); 
            padding: 60px 30px; border: 3px solid var(--gold); border-radius: 35px; text-align: center;
            box-shadow: 0 0 60px rgba(255,215,0,0.3), inset 0 0 30px rgba(0,0,0,0.7);
        }
        .win-title { 
            color: var(--gold); font-size: 52px; margin: 0; font-weight: 900; text-transform: uppercase; 
            letter-spacing: -1px; text-shadow: 0 0 25px var(--gold), 0 4px 6px rgba(0,0,0,0.6);
        }
        .cta-btn { 
            display: block; margin-top: 50px; padding: 24px; 
            background: linear-gradient(to bottom, var(--gold-shine), var(--gold)); color: #000; 
            text-decoration: none; border-radius: 18px; font-weight: 900; font-size: 24px; 
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5), inset 0 2px 2px rgba(255,255,255,0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .flash { animation: f 0.1s linear; }
        @keyframes f { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(3.5); } }
    </style>
</head>
<body>

<div id="game-view">
    <div class="top-nav">
        <div class="header-main">
            <div class="fighter-info">
                <div class="name-row">
                    <img src="https://flagcdn.com/w80/ua.png" class="flag">
                    <span class="name-text">Усик</span>
                </div>
                <div class="hp-bar-bg"><div id="hp-fill-usyk" class="hp-fill"></div></div>
            </div>

            <div class="timer-box">
                <div class="time-val">02:59</div>
                <div class="round-val">Раунд 1</div>
            </div>

            <div class="fighter-info">
                <div class="name-row" style="justify-content: flex-end;">
                    <span id="rico-name" class="name-text">Ріко</span>
                    <img src="https://flagcdn.com/w80/nl.png" class="flag">
                </div>
                <div class="hp-bar-bg"><div id="hp-fill-rico" class="hp-fill" style="float:right"></div></div>
            </div>
        </div>
    </div>

    <div class="arena">
        <img src="usyk_stance.png" id="usyk" class="fighter">
        <img src="verhoeven_stance.png" id="rico" class="fighter">

        <div class="hit-btn u-head" onclick="kick('rico', 'usyk', 'head')"><div class="dot"></div></div>
        <div class="hit-btn u-body" onclick="kick('rico', 'usyk', 'body')"><div class="dot"></div></div>
        <div class="hit-btn r-head" onclick="kick('usyk', 'rico', 'head')"><div class="dot"></div></div>
        <div class="hit-btn r-body" onclick="kick('usyk', 'rico', 'body')"><div class="dot"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="instruction">ТИЦЯЙ, ЩОБ АТАКУВАТИ!</div>
    </div>

    <div id="ui-win">
        <div class="win-card">
            <h1 id="win-text" class="win-title">ПЕРЕМОГА!</h1>
            <p style="color:#fff; font-size: 19px; margin-top: 18px; font-weight: bold; text-shadow: 0 2px 4px #000;">ТИ — СПРАВЖНІЙ ЧЕМПІОН</p>
            <a href="https://74064403.uatracer.link/" class="cta-btn">ЗАБРАТИ БОНУС</a>
        </div>
    </div>
</div>

<script>
    let hp = { usyk: 100, rico: 100 };
    let lock = false;
    
    function kick(attacker, target, zone) {
        if (lock || hp[target] <= 0) return;
        lock = true;

        const aImg = document.getElementById(attacker);
        const tImg = document.getElementById(target);

        document.getElementById('game-view').classList.add('flash');
        setTimeout(() => document.getElementById('game-view').classList.remove('flash'), 100);

        let move = (attacker === 'usyk') ? '60px' : '-60px';
        aImg.style.transform = (attacker === 'rico') ? `translateX(${move}) scaleX(-1)` : `translateX(${move})`;

        hp[target] -= 34; // 3 удари до нокауту
        if (hp[target] < 0) hp[target] = 0;
        document.getElementById(`hp-fill-${target}`).style.width = hp[target] + '%';

        if (hp[target] > 0) {
            setTimeout(() => {
                tImg.src = (target === 'rico') ? `verhoeven_${zone}_hit.png` : `usyk_${zone}_hit.png`;
            }, 50);
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_stance.png' : 'usyk_stance.png';
                aImg.style.transform = (attacker === 'rico') ? 'scaleX(-1)' : 'none';
                lock = false;
            }, 400);
        } else {
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_knockout.png' : 'usyk_knockout.png';
                tImg.classList.add(target === 'usyk' ? 'ko-floor' : 'ko-floor-r');
                document.querySelectorAll('.hit-btn, .bottom-nav').forEach(el => el.remove());

                setTimeout(() => {
                    aImg.style.transform = (attacker === 'rico') ? 'scaleX(-1)' : 'none';
                    document.getElementById('win-text').innerText = (attacker === 'usyk' ? 'УСИК ПЕРЕМІГ!' : 'РІКО ПЕРЕМІГ!');
                    document.getElementById('ui-win').style.display = 'flex';
                }, 1000);
            }, 50);
        }
    }
</script>

</body>
</html>
