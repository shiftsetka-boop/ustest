<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Boxing Championship</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --red: #ff3b30; 
            --green: #2ecc71;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }

        #game-view {
            position: relative; height: 100vh; width: 100vw; max-width: 500px;
            background: url('cinematic_boxing_ring.png') center center / cover no-repeat;
            overflow: hidden;
            box-shadow: inset 0 0 120px #000;
        }

        /* HUD */
        .top-nav { position: absolute; top: 0; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent); padding: 25px 15px; z-index: 100; }
        .header-main { display: flex; justify-content: space-between; align-items: flex-start; }
        .fighter-info { width: 36%; }
        .hp-bar-bg { width: 100%; height: 20px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3); border-radius: 5px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--green), #a2ff00); transition: width 0.4s; }
        .timer-box { display: flex; flex-direction: column; align-items: center; border: 2px solid var(--gold); padding: 5px 10px; border-radius: 10px; background: #000; }
        .time-val { color: var(--gold); font-weight: 900; font-size: 20px; }

        /* АРЕНА */
        .arena { position: absolute; bottom: 8%; width: 100%; height: 65%; z-index: 10; }

        .fighter-wrapper {
            position: absolute;
            height: 100%;
            width: 75%; 
            bottom: 0;
            transition: transform 0.15s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        
        #usyk-wrap { left: -10%; }
        #rico-wrap { right: -10%; }

        .fighter { width: 100%; height: 100%; object-fit: contain; transition: all 0.9s ease-in; }
        #rico-img { transform: scaleX(-1); }

        /* --- ТУТ ТВОЄ РЕДАГУВАННЯ НОКАУТУ --- */
        .ko-floor { 
            /* Для Усика */
            transform: translateY(40%) translateX(0%) rotate(0deg) !important; 
            opacity: 0.6; 
            pointer-events: none;
        }
        .ko-floor-r { 
            /* Для Ріко (пам'ятай про розворот scaleX(-1)) */
            transform: scaleX(-1) translateY(40%) translateX(0%) rotate(0deg) !important; 
            opacity: 0.6; 
            pointer-events: none;
        }

        /* ТОЧКИ */
        .hit-btn { position: absolute; width: 80px; height: 80px; z-index: 110; display: flex; align-items: center; justify-content: center; }
        .dot {
            width: 25px; height: 25px; border: 3px solid #fff; border-radius: 50%;
            background: radial-gradient(circle, #ff0000, #800);
            box-shadow: 0 0 20px var(--red);
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Позиції точок на тілі */
        .u-head { top: 18%; right: 50%; } 
        .u-body { top: 32%; right: 50%; }
        .r-head { top: 16%; left: 50%; } 
        .r-body { top: 32%; left: 50%; }

        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .instruction { border: 2px solid var(--gold); padding: 15px; border-radius: 30px; color: #fff; font-weight: 900; width: 80%; text-align: center; background: rgba(255,215,0,0.1); text-transform: uppercase; }

        #ui-win { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .win-card { border: 3px solid var(--gold); padding: 50px 20px; text-align: center; border-radius: 30px; width: 85%; background: #111; }
        .flash { animation: f 0.1s linear; }
        @keyframes f { 50% { filter: brightness(3); } }
    </style>
</head>
<body>

<div id="game-view">
    <div class="top-nav">
        <div class="header-main">
            <div class="fighter-info">
                <div style="color:#fff; font-weight:900; margin-bottom:5px;">УСИК</div>
                <div class="hp-bar-bg"><div id="hp-fill-usyk" class="hp-fill"></div></div>
            </div>
            <div class="timer-box">
                <div id="timer" class="time-val">03:00</div>
                <div style="color:#fff; font-size:10px;">РАУНД 1</div>
            </div>
            <div class="fighter-info">
                <div style="color:var(--gold); font-weight:900; text-align:right; margin-bottom:5px;">РІКО</div>
                <div class="hp-bar-bg"><div id="hp-fill-rico" class="hp-fill" style="float:right"></div></div>
            </div>
        </div>
    </div>

    <div class="arena">
        <div class="fighter-wrapper" id="usyk-wrap">
            <img src="usyk_stance.png" id="usyk-img" class="fighter">
            <div class="hit-btn u-head" onclick="kick('rico', 'usyk', 'head')"><div class="dot"></div></div>
            <div class="hit-btn u-body" onclick="kick('rico', 'usyk', 'body')"><div class="dot"></div></div>
        </div>

        <div class="fighter-wrapper" id="rico-wrap">
            <img src="verhoeven_stance.png" id="rico-img" class="fighter">
            <div class="hit-btn r-head" onclick="kick('usyk', 'rico', 'head')"><div class="dot"></div></div>
            <div class="hit-btn r-body" onclick="kick('usyk', 'rico', 'body')"><div class="dot"></div></div>
        </div>
    </div>

    <div class="bottom-nav"><div class="instruction">ТИЦЯЙ ПО ТОЧКАХ!</div></div>

    <div id="ui-win">
        <div class="win-card">
            <h1 id="win-text" style="color:var(--gold); font-size: 32px; margin:0;"></h1>
            <p style="margin: 20px 0;">ПОТУЖНО!</p>
            <a href="ТВОЯ_СИЛКА" style="background:var(--gold); color:#000; padding:18px 30px; text-decoration:none; font-weight:900; border-radius:15px; display:inline-block; text-transform:uppercase;">Забрати бонус</a>
        </div>
    </div>
</div>

<script>
    let hp = { usyk: 100, rico: 100 };
    let lock = false;
    let timerStarted = false;
    let timeLeft = 180;
    let timerInterval;

    function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(timeLeft<=0) clearInterval(timerInterval);
        }, 1000);
    }

    function kick(attacker, target, zone) {
        if (lock || hp[target] <= 0) return;
        lock = true;
        startTimer();

        const aWrap = document.getElementById(attacker + '-wrap');
        const tImg = document.getElementById(target + '-img');

        document.getElementById('game-view').classList.add('flash');
        setTimeout(() => document.getElementById('game-view').classList.remove('flash'), 120);

        let move = (attacker === 'usyk') ? '60px' : '-60px';
        aWrap.style.transform = `translateX(${move})`;

        hp[target] -= 34;
        document.getElementById(`hp-fill-${target}`).style.width = Math.max(0, hp[target]) + '%';

        if (hp[target] > 0) {
            setTimeout(() => {
                tImg.src = (target === 'rico') ? `verhoeven_${zone}_hit.png` : `usyk_${zone}_hit.png`;
            }, 50);
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_stance.png' : 'usyk_stance.png';
                aWrap.style.transform = 'none';
                lock = false;
            }, 850); 
        } else {
            clearInterval(timerInterval);
            setTimeout(() => {
                tImg.src = (target === 'rico') ? 'verhoeven_knockout.png' : 'usyk_knockout.png';
                
                // ТУТ КЛАСИ ДОДАЮТЬСЯ ЯК РАНІШЕ
                tImg.classList.add(target === 'usyk' ? 'ko-floor' : 'ko-floor-r');
                
                document.querySelectorAll('.hit-btn, .bottom-nav').forEach(b => b.style.display = 'none');
                setTimeout(() => {
                    document.getElementById('win-text').innerText = (attacker==='usyk'?'УСИК':'РІКО') + ' ПЕРЕМІГ!';
                    document.getElementById('ui-win').style.display = 'flex';
                }, 1200);
            }, 50);
        }
    }
</script>
</body>
</html>
